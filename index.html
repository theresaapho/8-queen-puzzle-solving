<body class="bg-gray-100 dark:bg-gray-950 min-h-screen flex flex-col items-center justify-center p-4 relative transition-colors duration-200">

                        ⚙️
                    </button>

                        </div>
                        <div>
                            <label class="block text-xs font-medium text-gray-700 dark:text-gray-300">Cols (N)</label>
                            <input id="inputN" type="number" value="8" min="1" class="mt-1 block w-full rounded-md border-gray-300 dark:border-gray-700 bg-white dark:bg-gray-800 text-gray-950 dark:text-gray-100 p-2 border text-sm focus:ring-indigo-500 focus:border-indigo-500">
                        </div>
                    </div>
                    <div>

                        <input id="inputQ" type="number" value="8" min="1" class="mt-1 block w-full rounded-md border-gray-300 dark:border-gray-700 bg-white dark:bg-gray-800 text-gray-950 dark:text-gray-100 p-2 border text-sm focus:ring-indigo-500 focus:border-indigo-500">
                    </div>

    <!-- Settings Dialog Modal (Hidden by Default) -->

            <div class="flex items-center justify-between border-b dark:border-gray-700 pb-3 mb-4">

    <script>
        let M = 8, N = 8, Q = 8;
        let currentState = []; 
        let animStates = [];
        let animIdx = 0;
        let isAnimating = false;
        let animationTimeout = null;
        let restartCount = 0;

        // Drag and Drop State
        let isDragging = false;
        let draggedIdx = null;
        let dragX = 0;
        let dragY = 0;

        const canvas = document.getElementById('boardCanvas');
        const ctx = canvas.getContext('2d');

        // UI references
        const inputM = document.getElementById('inputM');
        const inputN = document.getElementById('inputN');
        const inputQ = document.getElementById('inputQ');
        const selectAlgo = document.getElementById('selectAlgo');
        const checkDrag = document.getElementById('checkDrag');
        const checkRestart = document.getElementById('checkRestart');
        const checkDark = document.getElementById('checkDark');
        const inputDelay = document.getElementById('inputDelay');
        const delayVal = document.getElementById('delayVal');
        const btnReset = document.getElementById('btnReset');
        const btnSolve = document.getElementById('btnSolve');
        const btnCount = document.getElementById('btnCount');
        const btnExport = document.getElementById('btnExport');
        const inputImport = document.getElementById('inputImport');
        const statusText = document.getElementById('statusText');
        const conflictsText = document.getElementById('conflictsText');
        const stepsText = document.getElementById('stepsText');
        const restartText = document.getElementById('restartText');
        const solutionsText = document.getElementById('solutionsText');

        // Settings Modal References
        const settingsModal = document.getElementById('settingsModal');
        const btnOpenSettings = document.getElementById('btnOpenSettings');
        const btnCloseSettings = document.getElementById('btnCloseSettings');
        const btnApplySettings = document.getElementById('btnApplySettings');

        // Troll References
        const btnTroll = document.getElementById('btnTroll');
        const trollOverlay = document.getElementById('trollOverlay');
        const btnCloseTroll = document.getElementById('btnCloseTroll');
        const trollVideo = document.getElementById('trollVideo');

        // Dark Mode initialization from LocalStorage
        if (localStorage.getItem('darkMode') === 'enabled') {
            document.documentElement.classList.add('dark');
            checkDark.checked = true;
        } else {
            document.documentElement.classList.remove('dark');
            checkDark.checked = false;
        }

        // Settings Modal Events
        btnOpenSettings.addEventListener('click', () => {
            settingsModal.classList.remove('hidden');
        });
        
        const closeSettings = () => {
            settingsModal.classList.add('hidden');
        };
        btnCloseSettings.addEventListener('click', closeSettings);
        btnApplySettings.addEventListener('click', closeSettings);

        // Dark Mode Toggle Event
        checkDark.addEventListener('change', () => {
            if (checkDark.checked) {
                document.documentElement.classList.add('dark');
                localStorage.setItem('darkMode', 'enabled');
            } else {
                document.documentElement.classList.remove('dark');
                localStorage.setItem('darkMode', 'disabled');
            }
        });

        // Hide Auto-restart option when A* algorithm is selected (Since A* doesn't use it)
        selectAlgo.addEventListener('change', () => {
            const container = document.getElementById('restartToggleContainer');
            if (selectAlgo.value === "HillClimbing") {
                container.classList.remove('hidden');
            } else {
                container.classList.add('hidden');
            }
        });

        inputDelay.addEventListener('input', () => {
            delayVal.textContent = `${inputDelay.value} ms`;
        });

        // Handle Drag status change inside settings modal
        checkDrag.addEventListener('change', () => {
            if (checkDrag.checked) {
                if (isAnimating) {
                    clearTimeout(animationTimeout);
                    isAnimating = false;
                    statusText.textContent = "Status: Manual Mode";
                    statusText.className = "font-bold text-base text-emerald-600 dark:text-emerald-400";
                }
            }
        });

        btnReset.addEventListener('click', resetBoard);
        btnSolve.addEventListener('click', solve);
        btnCount.addEventListener('click', calculateTotalPlacements);
        btnExport.addEventListener('click', exportToTXT);
        inputImport.addEventListener('change', importFromTXT);

        // Drag & Drop Canvas events
        canvas.addEventListener('mousedown', dragStart);
        canvas.addEventListener('mousemove', dragMove);
        canvas.addEventListener('mouseup', dragEnd);
        canvas.addEventListener('mouseleave', dragEnd);

        canvas.addEventListener('touchstart', dragStart, { passive: false });
        canvas.addEventListener('touchmove', dragMove, { passive: false });
        canvas.addEventListener('touchend', dragEnd);

        // Troll Button Event Handlers
        btnTroll.addEventListener('click', () => {
            trollOverlay.classList.remove('hidden');
            if (trollOverlay.requestFullscreen) {
                trollOverlay.requestFullscreen().catch(() => {});
            }
            trollVideo.play().catch(err => {
                console.log("Local video loading blocked or not found. Place file next to HTML for standard fallback.", err);
            });
        });

        btnCloseTroll.addEventListener('click', () => {
            trollVideo.pause();
            trollVideo.currentTime = 0;
            trollOverlay.classList.add('hidden');
            if (document.exitFullscreen) {
                document.exitFullscreen().catch(() => {});
            }
        });

        function resetBoard() {
            if (isAnimating) {
                clearTimeout(animationTimeout);
                isAnimating = false;
            }

            M = parseInt(inputM.value) || 8;
            N = parseInt(inputN.value) || 8;
            Q = parseInt(inputQ.value) || 8;

            if (M <= 0 || N <= 0 || Q <= 0) {
                alert("Please enter valid positive numbers.");
                return;
            }
            if (Q > M * N) {
                alert("The number of queens cannot exceed the total board spaces!");
                return;
            }

            solutionsText.classList.add('hidden');
            restartText.classList.add('hidden');

            currentState = getRandomState();
            animStates = [];
            statusText.textContent = "Status: Ready";
            statusText.className = "font-bold text-base text-gray-800 dark:text-gray-200";
            stepsText.textContent = "Steps / Nodes: 0";
            
            updateConflictsLabel();
            drawBoard();
        }

        function getRandomState() {
            let allCells = [];
            for (let r = 0; r < M; r++) {
                for (let c = 0; c < N; c++) {
                    allCells.push([r, c]);
                }
            }
            allCells.sort(() => Math.random() - 0.5);
            return allCells.slice(0, Q);
        }

        function calculateConflicts(state) {
            let conflicts = 0;
            let q = state.length;
            for (let i = 0; i < q; i++) {
                for (let j = i + 1; j < q; j++) {
                    let [r1, c1] = state[i];
                    let [r2, c2] = state[j];
                    if (r1 === r2 || c1 === c2 || Math.abs(r1 - r2) === Math.abs(c1 - c2)) {
                        conflicts++;
                    }
                }
            }
            return conflicts;
        }

        function getConflictingQueens(state) {
            let conflicting = new Set();
            let q = state.length;
            for (let i = 0; i < q; i++) {
                for (let j = i + 1; j < q; j++) {
                    let [r1, c1] = state[i];
                    let [r2, c2] = state[j];
                    if (r1 === r2 || c1 === c2 || Math.abs(r1 - r2) === Math.abs(c1 - c2)) {
                        conflicting.add(`${r1},${c1}`);
                        conflicting.add(`${r2},${c2}`);
                    }
                }
            }
            return conflicting;
        }

        function updateConflictsLabel() {
            let c = calculateConflicts(currentState);
            conflictsText.textContent = `Current Conflicts: ${c}`;
        }

        function drawBoard() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            const cellW = canvas.width / N;
            const cellH = canvas.height / M;
            const conflictingSet = getConflictingQueens(currentState);

            // Draw grid
            for (let r = 0; r < M; r++) {
                for (let c = 0; c < N; c++) {
                    ctx.fillStyle = (r + c) % 2 === 0 ? "#f0d9b5" : "#b58863";
                    ctx.fillRect(c * cellW, r * cellH, cellW, cellH);
                }
            }

            // Draw Queens
            const fontSize = Math.min(cellW, cellH) * 0.45;
            ctx.font = `bold ${fontSize}px Helvetica`;
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';

            currentState.forEach(([r, c], idx) => {
                let cx, cy;
                
                if (isDragging && idx === draggedIdx) {
                    cx = dragX;
                    cy = dragY;
                } else {
                    cx = c * cellW + cellW / 2;
                    cy = r * cellH + cellH / 2;
                }

                ctx.fillStyle = conflictingSet.has(`${r},${c}`) ? "#e74c3c" : "#27ae60";
                
                if (isDragging && idx === draggedIdx) {
                    ctx.shadowColor = "rgba(0, 0, 0, 0.4)";
                    ctx.shadowBlur = 10;
                    ctx.fillText("♛", cx, cy);
                    ctx.shadowBlur = 0;
                } else {
                    ctx.fillText("♛", cx, cy);
                }
            });
        }

        // --- Drag & Drop Coordinate Handlers ---
        function getEventPos(e) {
            const rect = canvas.getBoundingClientRect();
            let clientX = e.clientX;
            let clientY = e.clientY;
            
            if (e.touches && e.touches.length > 0) {
                clientX = e.touches[0].clientX;
                clientY = e.touches[0].clientY;
            }
            return {
                x: clientX - rect.left,
                y: clientY - rect.top
            };
        }

        function dragStart(e) {
            if (!checkDrag.checked || isAnimating) return;
            e.preventDefault(); 
            
            const pos = getEventPos(e);
            const cellW = canvas.width / N;
            const cellH = canvas.height / M;
            
            const clickedC = Math.floor(pos.x / cellW);
            const clickedR = Math.floor(pos.y / cellH);

            draggedIdx = currentState.findIndex(([r, c]) => r === clickedR && c === clickedC);

            if (draggedIdx !== -1) {
                isDragging = true;
                dragX = pos.x;
                dragY = pos.y;
                drawBoard();
            }
        }

        function dragMove(e) {
            if (!isDragging || draggedIdx === null) return;
            e.preventDefault(); 

            const pos = getEventPos(e);
            dragX = pos.x;
            dragY = pos.y;
            drawBoard();
        }

        function dragEnd() {
            if (!isDragging || draggedIdx === null) return;

            const cellW = canvas.width / N;
            const cellH = canvas.height / M;
            
            let targetC = Math.floor(dragX / cellW);
            let targetR = Math.floor(dragY / cellH);

            if (targetR >= 0 && targetR < M && targetC >= 0 && targetC < N) {
                const tileIsOccupied = currentState.some(([qr, qc], idx) => idx !== draggedIdx && qr === targetR && qc === targetC);
                
                if (!tileIsOccupied) {
                    currentState[draggedIdx] = [targetR, targetC];
                    statusText.textContent = "Status: Manual Mode";
                    statusText.className = "font-bold text-base text-emerald-600 dark:text-emerald-400";
                }
            }

            isDragging = false;
            draggedIdx = null;
            updateConflictsLabel();
            drawBoard();
        }

        function getNeighbors(state) {
            let neighbors = [];
            let stateSet = new Set(state.map(p => `${p[0]},${p[1]}`));
            for (let i = 0; i < state.length; i++) {
                let [r, c] = state[i];
                for (let nr = 0; nr < M; nr++) {
                    for (let nc = 0; nc < N; nc++) {
                        if (!stateSet.has(`${nr},${nc}`)) {
                            let newState = state.map((p, idx) => idx === i ? [nr, nc] : p);
                            newState.sort((a, b) => a[0] - b[0] || a[1] - b[1]);
                            neighbors.push(newState);
                        }
                    }
                }
            }
            return neighbors;
        }

        // Hill Climbing with Local Stuck check
        function runHillClimbing(state) {
            let curr = state;
            let path = [curr];
            let steps = 0;

            while (true) {
                steps++;
                let currConflicts = calculateConflicts(curr);
                if (currConflicts === 0) {
                    return { success: true, path, steps };
                }

                let neighbors = getNeighbors(curr);
                if (neighbors.length === 0) break;

                let bestNeighbor = null;
                let bestConflicts = currConflicts;

                neighbors.sort(() => Math.random() - 0.5);

                for (let n of neighbors) {
                    let nc = calculateConflicts(n);
                    if (nc < bestConflicts) {
                        bestConflicts = nc;
                        bestNeighbor = n;
                    }
                }

                if (bestNeighbor) {
                    curr = bestNeighbor;
                    path.push(curr);
                } else {
                    return { success: false, path, steps };
                }
            }
            return { success: false, path, steps };
        }

        // Lightweight Min-Heap for A* Search
        class MinHeap {
            constructor() { this.data = []; }
            push(val) {
                this.data.push(val);
                this.up(this.data.length - 1);
            }
            pop() {
                if (this.data.length === 0) return null;
                const top = this.data[0];
                const bottom = this.data.pop();
                if (this.data.length > 0) {
                    this.data[0] = bottom;
                    this.down(0);
                }
                return top;
            }
            up(i) {
                while (i > 0) {
                    const p = Math.floor((i - 1) / 2);
                    if (this.data[i].f < this.data[p].f) {
                        [this.data[i], this.data[p]] = [this.data[p], this.data[i]];
                        i = p;
                    } else break;
                }
            }
            down(i) {
                const len = this.data.length;
                while (i * 2 + 1 < len) {
                    let left = i * 2 + 1;
                    let right = i * 2 + 2;
                    let best = left;
                    if (right < len && this.data[right].f < this.data[left].f) best = right;
                    if (this.data[best].f < this.data[i].f) {
                        [this.data[i], this.data[best]] = [this.data[best], this.data[i]];
                        i = best;
                    } else break;
                }
            }
        }

        function runAStar(startState) {
            let maxNodes = 1500;
            let pq = new MinHeap();
            let visited = new Set();
            let hStart = calculateConflicts(startState);
            pq.push({ f: hStart, g: 0, state: startState, path: [startState] });

            while (pq.data.length > 0 && maxNodes > 0) {
                maxNodes--;
                let { g, state, path } = pq.pop();

                if (calculateConflicts(state) === 0) {
                    return { success: true, path, steps: 1500 - maxNodes };
                }

                let stateKey = state.map(p => `${p[0]},${p[1]}`).join('|');
                if (visited.has(stateKey)) continue;
                visited.add(stateKey);

                let neighbors = getNeighbors(state);
                for (let neighbor of neighbors) {
                    let neighborKey = neighbor.map(p => `${p[0]},${p[1]}`).join('|');
                    if (!visited.has(neighborKey)) {
                        let gn = g + 1;
                        let hn = calculateConflicts(neighbor);
                        pq.push({ f: gn + hn, g: gn, state: neighbor, path: [...path, neighbor] });
                    }
                }
            }
            return { success: false, path: [startState], steps: 1500 - maxNodes };
        }

        function solve() {
            if (isAnimating) return;

            checkDrag.checked = false;

            let algo = selectAlgo.value;
            let startState = [...currentState].sort((a, b) => a[0] - b[0] || a[1] - b[1]);

            if (calculateConflicts(startState) === 0) {
                statusText.textContent = "Status: Already Solved!";
                statusText.className = "font-bold text-base text-green-600 dark:text-green-400";
                return;
            }

            statusText.textContent = "Status: Calculating...";
            statusText.className = "font-bold text-base text-yellow-600 dark:text-yellow-400";
            restartText.classList.add('hidden');

            setTimeout(() => {
                let result;
                let fullPath = [];
                let totalSteps = 0;
                restartCount = 0;

                if (algo === "HillClimbing") {
                    result = runHillClimbing(startState);
                    fullPath = [...result.path];
                    totalSteps = result.steps;

                    const shouldRestart = checkRestart.checked;
                    const maxRestarts = 100;

                    while (!result.success && shouldRestart && restartCount < maxRestarts) {
                        restartCount++;
                        let randomState = getRandomState().sort((a, b) => a[0] - b[0] || a[1] - b[1]);
                        result = runHillClimbing(randomState);
                        
                        fullPath.push(randomState); 
                        fullPath = fullPath.concat(result.path);
                        totalSteps += result.steps;
                    }
                } else {
                    result = runAStar(startState);
                    fullPath = result.path;
                    totalSteps = result.steps;
                }

                if (fullPath.length > 0) {
                    animStates = fullPath;
                    animIdx = 0;
                    isAnimating = true;
                    stepsText.textContent = `Steps / Nodes: ${totalSteps}`;
                    
                    if (algo === "HillClimbing" && checkRestart.checked) {
                        restartText.classList.remove('hidden');
                        restartText.textContent = `Restarts (Random Jump): ${restartCount}`;
                    }
                    animate(result.success);
                } else {
                    statusText.textContent = "Status: No Solution Found";
                    statusText.className = "font-bold text-base text-red-600 dark:text-red-400";
                }
            }, 50);
        }

        function animate(success) {
            if (animIdx < animStates.length) {
                currentState = animStates[animIdx];
                updateConflictsLabel();
                drawBoard();
                animIdx++;
                
                let delay = parseInt(inputDelay.value);
                animationTimeout = setTimeout(() => animate(success), delay);
            } else {
                isAnimating = false;
                if (success) {
                    statusText.textContent = "Status: Success (Solved!)";
                    statusText.className = "font-bold text-base text-green-600 dark:text-green-400";
                } else {
                    statusText.textContent = "Status: Stuck in Local Minimum";
                    statusText.className = "font-bold text-base text-red-600 dark:text-red-400";
                }
            }
        }

        // Optimized Row-by-Row Backtracking (Fixes 11x11 freeze completely)
        function calculateTotalPlacements() {
            if (isAnimating) return;
            
            M = parseInt(inputM.value) || 8;
            N = parseInt(inputN.value) || 8;
            Q = parseInt(inputQ.value) || 8;

            if (Q > M || Q > N) {
                solutionsText.classList.remove('hidden');
                solutionsText.textContent = "Total possible solutions: 0 (Conflicts unavoidable)";
                solutionsText.className = "text-red-700 font-bold bg-red-50 p-2 rounded border border-red-200 mt-2";
                return;
            }

            solutionsText.classList.remove('hidden');
            solutionsText.textContent = "Counting solutions (Running Row-by-Row Backtracking)...";
            solutionsText.className = "text-yellow-700 font-bold bg-yellow-50 p-2 rounded border border-yellow-200 mt-2";

            setTimeout(() => {
                let totalCount = 0;
                let limit = 10000;

                let cols = new Set();
                let diag1 = new Set();
                let diag2 = new Set();

                function backtrack(r, queensPlaced) {
                    if (queensPlaced === Q) {
                        totalCount++;
                        return;
                    }
                    if (r === M || totalCount >= limit) return;

                    if (Q - queensPlaced <= M - r) {
                        for (let c = 0; c < N; c++) {
                            if (!cols.has(c) && !diag1.has(r - c) && !diag2.has(r + c)) {
                                cols.add(c);
                                diag1.add(r - c);
                                diag2.add(r + c);

                                backtrack(r + 1, queensPlaced + 1);

                                cols.delete(c);
                                diag1.delete(r - c);
                                diag2.delete(r + c);
                            }
                        }
                    }

                    if (Q - queensPlaced < M - r) {
                        backtrack(r + 1, queensPlaced);
                    }
                }

                let t0 = performance.now();
                backtrack(0, 0);
                let t1 = performance.now();
                let timeSpent = ((t1 - t0) / 1000).toFixed(3);

                if (totalCount >= limit) {
                    solutionsText.textContent = `Total possible solutions: 10,000+ (Capped) in ${timeSpent}s`;
                    solutionsText.className = "text-indigo-700 font-bold bg-indigo-50 p-2 rounded border border-indigo-200 mt-2";
                } else {
                    solutionsText.textContent = `Total possible solutions: ${totalCount} (Found in ${timeSpent}s)`;
                    solutionsText.className = "text-emerald-700 font-bold bg-emerald-50 p-2 rounded border border-emerald-200 mt-2";
                }
            }, 50);
        }

        // Export current state to .txt file
        function exportToTXT() {
            if (currentState.length === 0) {
                alert("Nothing to export.");
                return;
            }
            
            let content = `M: ${M}\nN: ${N}\nQ: ${Q}\nState: ${JSON.stringify(currentState)}`;
            let blob = new Blob([content], { type: "text/plain;charset=utf-8" });
            let link = document.createElement("a");
            link.href = URL.createObjectURL(blob);
            link.download = `nqueens_${M}x${N}_q${Q}.txt`;
            link.click();
            URL.revokeObjectURL(link.href);
        }

        // Import and parse state from .txt file
        function importFromTXT(event) {
            let file = event.target.files[0];
            if (!file) return;

            let reader = new FileReader();
            reader.onload = function(e) {
                try {
                    let text = e.target.result;
                    let lines = text.split("\n");
                    let importedM, importedN, importedQ, importedState;

                    for (let line of lines) {
                        if (line.startsWith("M:")) importedM = parseInt(line.split(":")[1].trim());
                        if (line.startsWith("N:")) importedN = parseInt(line.split(":")[1].trim());
                        if (line.startsWith("Q:")) importedQ = parseInt(line.split(":")[1].trim());
                        if (line.startsWith("State:")) importedState = JSON.parse(line.substring(6).trim());
                    }

                    if (!importedM || !importedN || !importedQ || !importedState) {
                        throw new Error("Invalid format. File must contain M, N, Q and State.");
                    }
                    if (importedState.length !== importedQ) {
                        throw new Error("Quantity of coordinates in State does not match Q.");
                    }

                    inputM.value = importedM;
                    inputN.value = importedN;
                    inputQ.value = importedQ;
                    M = importedM;
                    N = importedN;
                    Q = importedQ;
                    currentState = importedState;

                    if (isAnimating) {
                        clearTimeout(animationTimeout);
                        isAnimating = false;
                    }
                    animStates = [];
                    solutionsText.classList.add('hidden');
                    restartText.classList.add('hidden');
                    
                    statusText.textContent = "Status: Imported Successfully";
                    statusText.className = "font-bold text-base text-indigo-600 dark:text-indigo-400";
                    stepsText.textContent = "Steps / Nodes: 0";

                    updateConflictsLabel();
                    drawBoard();
                    
                    event.target.value = '';
                } catch (err) {
                    alert("Failed to parse file: " + err.message);
                }
            };
            reader.readAsText(file);
        }

        // Initial setup
        resetBoard();
    </script>
</body>
